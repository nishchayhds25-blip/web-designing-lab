<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Registration Form</title>
</head>
<body>

<h2>Scholarship Registration Form</h2>

<form>

<h3>Personal Details</h3>

<label>First Name:</label><br>
<input type="text" name="firstname"><br><br>

<label>Last Name:</label><br>
<input type="text" name="lastname"><br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Mobile Number:</label><br>
<input type="tel" name="mobile"><br><br>

<label>Address:</label><br>
<textarea name="address"></textarea><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female
<input type="radio" name="gender" value="other"> Other
<br><br>


<h3>Educational Details</h3>

<label>College Name:</label><br>
<select name="college">
<option value="">Select College</option>
<option>S.B. Jain Institute of Technology, Management & Research</option>
<option>Yeshwantrao Chavan College of Engineering (YCCE)</option>
<option>G.H. Raisoni College of Engineering</option>
<option>Priyadarshini College of Engineering</option>
<option>Wainganga College of Engineering</option>
<option>St. Vincent Pallotti College of Engineering</option>
<option>KDK College of Engineering</option>
</select>
<br><br>


<h3>Student Achievements</h3>

<label>Write your achievements:</label><br>
<textarea name="achievement" rows="5" cols="40"></textarea>
<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
